appId: com.matrixops.app
productName: MatrixOps
copyright: Copyright © 2026

directories:
  output: dist-electron
  buildResources: build

files:
  - dist/**/*
  - electron/**/*
  - package.json

extraResources:
  - from: ../build/matrixops
    to: matrixops
  - from: ../build/matrixops.exe
    to: matrixops.exe
  - from: ../web-server/web/dist
    to: web-server/web/dist

mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  icon: build/icon.icns
  artifactName: ${productName}-${version}-${os}-${arch}.${ext}

win:
  target:
    - nsis
    - portable
  icon: build/icon.ico
  artifactName: ${productName}-${version}-${os}-${arch}.${ext}

linux:
  target:
    - AppImage
    - deb
  category: Development
  icon: build/icon.png
  artifactName: ${productName}-${version}-${os}-${arch}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
