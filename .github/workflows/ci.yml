name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    name: Go Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.1"
          cache-dependency-path: |
            go.sum
            agent/go.sum
            agent/core_agent/go.sum
            agent/memory/go.sum
            pkgs/go.sum
            tests/go.sum
            web-server/go.sum

      - name: Run test suite
        run: bash scripts/ci-test.sh

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-test-logs-${{ github.run_id }}
          path: |
            ci-logs/test-latest.log
            ci-logs/failures-latest.txt
            ci-logs/summary-latest.md
            ci-logs/module-*

      - name: Print failure summary
        if: failure()
        run: |
          echo "::group::Failure summary"
          if [ -f ci-logs/summary-latest.md ]; then
            cat ci-logs/summary-latest.md
          fi
          if [ -f ci-logs/failures-latest.txt ]; then
            echo ""
            echo "---- failure lines ----"
            cat ci-logs/failures-latest.txt
          fi
          echo "::endgroup::"
