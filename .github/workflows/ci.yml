name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    name: Go Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.1"
          cache-dependency-path: |
            go.sum
            agent/go.sum
            agent/core_agent/go.sum
            agent/memory/go.sum
            pkgs/go.sum
            tests/go.sum
            web-server/go.sum

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Run test suite
        run: task test
