name: Electron Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            electron_script: electron:build:mac
            artifact_name: mac
            artifact_paths: |
              frontend/dist-electron/*.dmg
              frontend/dist-electron/*.zip
          - os: windows-latest
            platform: win
            electron_script: electron:build:win
            artifact_name: win
            artifact_paths: |
              frontend/dist-electron/*.exe
          - os: ubuntu-latest
            platform: linux
            electron_script: electron:build:linux
            artifact_name: linux
            artifact_paths: |
              frontend/dist-electron/*.AppImage
              frontend/dist-electron/*.deb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.1"
          cache-dependency-path: |
            go.sum
            web-server/go.sum
            agent/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot rpm

      - name: Generate Windows icon
        if: runner.os == 'Windows'
        shell: bash
        run: |
          if [ ! -f frontend/build/icon.ico ]; then
            python -m pip install --upgrade pip pillow
            python -c "from PIL import Image; img = Image.open('frontend/build/icon.png'); img.save('frontend/build/icon.ico', sizes=[(256, 256), (128, 128), (64, 64), (48, 48), (32, 32), (16, 16)])"
          fi

      - name: Build backend binary
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            go build -o matrixops.exe ./cmd/main.go
          else
            go build -o matrixops ./cmd/main.go
          fi

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build Electron package
        working-directory: frontend
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run build
          npm run ${{ matrix.electron_script }}

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: false

      - name: Show downloaded files
        run: find release-assets -type f | sort

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/**/*
